name: Test sorter images in Docker

on: workflow_dispatch


jobs:
  test-images:
    name: Test on (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.10'
          enable-cache: true
      - name: Python version
        run:
          python --version
      - name: Docker version
        run:
          docker --version
      - name: Install dependencies
        run: |
          uv pip install --system pytest
          uv pip install --system -e .[full]
          uv pip install --system docker
      - name: Run test docker containers
        run: |
          pytest -vv --capture=tee-sys -rA src/spikeinterface/sorters/external/tests/test_docker_containers.py
