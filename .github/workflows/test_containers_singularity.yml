name: Test sorter images in singularity

on: workflow_dispatch


jobs:
  test-images:
    name: Test on (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # "macos-latest", "windows-latest"
        os: ["ubuntu-latest", ]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.10'
          enable-cache: true
      - uses: eWaterCycle/setup-singularity@v7
        with:
          singularity-version: 3.8.7
      - name: Python version
        run:
          python --version
      - name: Singularity version
        run:
          singularity --version
      - name: Install dependencies
        run: |
          uv pip install --system pytest
          uv pip install --system -e .[full]
          uv pip install --system spython
      - name: Run test singularity containers
        run: |
          pytest -vv --capture=tee-sys -rA src/spikeinterface/sorters/external/tests/test_singularity_containers.py
